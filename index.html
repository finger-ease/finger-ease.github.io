<!doctype html>
<html lang="ja">
  <head>
    <script>
      // Theme initialisation (avoid flash)
      (function () {
        try {
          var k = 'fingerEase-theme'
          var s = localStorage.getItem(k)
          var dark = s ? s === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light'
        } catch (e) {}
      })()
      // SPA redirect restore (works with public/404.html)
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location)
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="fingerEase - 個人開発プロジェクトポータル" />
    <title>fingerEase / Works</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
